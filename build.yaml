version: 1
frontend:
    phases:
        preBuild:
            commands:
                - npm ci
        build:
            commands:
                # Write environment variables to .env.production for runtime access
                - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
                - echo "CLERK_SECRET_KEY=$CLERK_SECRET_KEY" >> .env.production
                - echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" >> .env.production
                - echo "PLAID_CLIENT_ID=$PLAID_CLIENT_ID" >> .env.production
                - echo "PLAID_SECRET=$PLAID_SECRET" >> .env.production
                - echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env.production
                - npm run build
    artifacts:
        baseDirectory: .next
        files:
            - "**/*"
    cache:
        paths:
            - node_modules/**/*
